<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store</title>
    <link rel="stylesheet" href="/CSS/fashion.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">FashionHub</div>

        <ul class="nav-links">
            <li><a href="/HTML/home page.html">Home</a></li>
            <li><a href="#">Men</a></li>
            <li><a href="#">Women</a></li>
            <li><a href="#">Accessories</a></li>
        </ul>

    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>New Fashion Collection 2026</h1>
            <p>Discover Trendy Styles for Every Season</p>
            <button>Shop Now</button>
        </div>
    </section>

    <!-- Search -->
   
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search Fashion Products...">
    </section>
    
    <!-- Products -->
    <section class="products">

        <div class="product-card">
            <img src="/Assets/casual shirt.jpg" alt="Shirt">
            <h3>Men's Casual Shirt</h3>
            <p>₹999</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/chudi.jpg" alt="Chudi">
            <h3>Women's Chudi</h3>
            <p>₹1,499</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/Denime jacket.jpg" alt="Jacket">
            <h3>Denim Jacket</h3>
            <p>₹1,899</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/Hand Bag.jpg" alt="Handbag">
            <h3>Stylish Handbag</h3>
            <p>₹1,299</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/womens heels.jpg" alt="heels">
            <h3>Women's Heels</h3>
            <p>₹1,799</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/Snickers.jpg" alt="shoes">
            <h3>Men's Sneakers</h3>
            <p>₹2,299</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

    </section>

    <script src="/Scripts/fashion.js"></script>

</body>
</html>
