<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessories Store</title>
    <link rel="stylesheet" href="/CSS/accessories.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Accessories</div>

        <ul class="nav-links">
            <li><a href="/HTML/index.html">Home</a></li>
            <li><a href="#">Watches</a></li>
            <li><a href="#">Bags</a></li>
            <li><a href="#">Jewellery</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Stylish Accessories Collection</h1>
            <p>Upgrade your look with premium accessories.</p>
            <button>Shop Now</button>
        </div>
    </section>

    <!-- Search -->
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search accessories...">
    </section>

    <!-- Products -->
    <section class="products">

        <div class="product-card">
            <img src="/Assets/luxry watch.jpg" alt="watch">
            <h3>Luxury Watch</h3>
            <p>₹2,999</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/Leather Wallet.jpg" alt="wallet">
            <h3>Leather Wallet</h3>
            <p>₹799</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/Sun glass.jpg" alt="sun glass">
            <h3>Fashion Sunglasses</h3>
            <p>₹999</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/Hand Bag.jpg" alt="handbag">
            <h3>Women's Handbag</h3>
            <p>₹1,499</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="/Assets/back pack 2.jpg" alt="bag">
            <h3>Travel Backpack</h3>
            <p>₹1,299</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

    </section>

    <script src="/Scripts/accessories.js"></script>

</body>
</html>
