<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <link rel="stylesheet" href="/CSS/books.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Books</div>

        <ul class="nav-links">
            <li><a href="/HTML/index.html">Home</a></li>
            <li><a href="#">Fiction</a></li>
            <li><a href="#">Education</a></li>
            <li><a href="#">Biography</a></li>
        </ul>

    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover Your Next Favorite Book</h1>
            <p>Explore thousands of books from every genre.</p>
            <button>Browse Books</button>
        </div>
    </section>

    <!-- Search -->
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search books...">
    </section>

    <!-- Books Section -->
    <section class="books-container">

        <div class="book-card">
            <img src="/Assets/Rich Dad Poor Dad.jpg" alt="Book">
            <h3>Rich Dad Poor Dad</h3>
            <p>₹399</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="book-card">
            <img src="/Assets/Atomic Habits.jpg" alt="Book">
            <h3>Atomic Habits</h3>
            <p>₹499</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="book-card">
            <img src="/Assets/The psychology of Money.jpg" alt="Book">
            <h3>The Psychology of Money</h3>
            <p>₹450</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="book-card">
            <img src="/Assets/think & grow rich.jpg" alt="Book">
            <h3>Think and Grow Rich</h3>
            <p>₹350</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="book-card">
            <img src="/Assets/Ikigai - The Japanese Secret to a Long and Happy Life.jpg" alt="Book">
            <h3>Ikigai</h3>
            <p>₹299</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

        <div class="book-card">
            <img src="/Assets/The Alchemist Book _ Find Your Purpose & Follow Your Dreams.jpg" alt="Book">
            <h3>The Alchemist</h3>
            <p>₹399</p>
            <button class="cart-btn">Add To Cart</button>
        </div>

    </section>

    <script src="/Scripts/books.js"></script>

</body>
</html>
